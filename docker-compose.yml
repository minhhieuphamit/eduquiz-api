# ══════════════════════════════════════════════════════
# EduQuiz - Docker Compose (Local Development)
# ══════════════════════════════════════════════════════
# Sử dụng: docker-compose up -d
# Dừng:    docker-compose down
# Xóa data: docker-compose down -v

version: '3.8'

services:

  # ══════════════════════════════════════════════════════
  # DATABASE
  # ══════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: eduquiz-postgres
    environment:
      POSTGRES_DB: eduquiz
      POSTGRES_USER: eduquiz
      POSTGRES_PASSWORD: eduquiz
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - eduquiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduquiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════════════════
  # KAFKA
  # ══════════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: eduquiz-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - eduquiz-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eduquiz-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - eduquiz-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ══════════════════════════════════════════════════════
  # SPRING BOOT API
  # ══════════════════════════════════════════════════════
  eduquiz-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eduquiz-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: eduquiz
      DB_USERNAME: eduquiz
      DB_PASSWORD: eduquiz
      KAFKA_SERVERS: kafka:29092
      LOGSTASH_HOST: logstash
      JWT_SECRET: ${JWT_SECRET:-supersecretkey-change-in-production-min32chars}
      API_KEY: ${API_KEY:-local-dev-api-key}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:4200}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      logstash:
        condition: service_started
    networks:
      - eduquiz-network
    restart: on-failure

  # ══════════════════════════════════════════════════════
  # LOGGING - ELK STACK
  # ══════════════════════════════════════════════════════
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: eduquiz-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - eduquiz-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: eduquiz-logstash
    ports:
      - "5044:5044"
    volumes:
      - ./src/main/resources/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - eduquiz-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: eduquiz-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - eduquiz-network

  # ══════════════════════════════════════════════════════
  # MONITORING - PROMETHEUS + GRAFANA
  # ══════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: eduquiz-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - eduquiz-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: eduquiz-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-opensearch-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - elasticsearch
    networks:
      - eduquiz-network

# ══════════════════════════════════════════════════════
# VOLUMES & NETWORKS
# ══════════════════════════════════════════════════════
volumes:
  postgres-data:
  es-data:
  grafana-data:
  prometheus-data:

networks:
  eduquiz-network:
    driver: bridge
