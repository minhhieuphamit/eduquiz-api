# ══════════════════════════════════════════════════════
# EduQuiz API - Application Configuration
# ══════════════════════════════════════════════════════

spring:
  application:
    name: eduquiz-api

  # ── Database ──
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eduquiz}
    username: ${DB_USERNAME:eduquiz}
    password: ${DB_PASSWORD:eduquiz}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate  # Dùng Flyway, KHÔNG dùng auto-ddl
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Kafka ──
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest

  # ── Mail (OTP) ──
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ── JWT ──
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}   # default 1 giờ (ms)
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}  # default 7 ngày (ms)

# ── OTP ──
otp:
  expiration-minutes: 5
  max-attempts: 5
  max-resend: 3
  resend-cooldown-minutes: 10

# ── Actuator (Prometheus metrics) ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: eduquiz-api
  endpoint:
    health:
      show-details: always

# ── Swagger ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── File Upload ──
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  max-size-mb: 5
  allowed-types: image/jpeg,image/png,image/gif,image/webp
  base-url: ${FILE_BASE_URL:http://localhost:8080/uploads}

# ── Server ──
server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# ── Frontend ──
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# ── API Security ──
api:
  security:
    api-key: ${API_KEY}
