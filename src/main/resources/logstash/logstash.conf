input {
  tcp {
    port => 5044
    codec => json
  }
}

filter {
  # Parse @timestamp từ field của logstash-logback-encoder
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Đảm bảo level là uppercase
  mutate {
    uppercase => ["level"]
  }

  # Xóa field thừa không cần thiết
  mutate {
    remove_field => ["port", "host", "tags"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "eduquiz-logs-%{+YYYY.MM.dd}"
    ilm_enabled => false
  }

  # Debug: in ra console của Logstash (tắt ở production)
  # stdout { codec => rubydebug }
}
